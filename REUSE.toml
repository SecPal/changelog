version = 1

# MDX plugins and config files adapted from Tailwind Plus Commit template
[[annotations]]
path = ["mdx/**", "mdx-components.tsx"]
SPDX-FileCopyrightText = ["2026 SecPal", "Tailwind Labs Inc."]
SPDX-License-Identifier = "AGPL-3.0-or-later AND LicenseRef-TailwindPlus"

[[annotations]]
path = [
  "next.config.mjs",
  "eslint.config.mjs",
  "tsconfig.json",
  ".prettierignore",
  "postcss.config.js",
  "prettier.config.js",
  ".eslintrc.json",
  ".prettierrc.json",
  ".editorconfig",
  ".gitignore",
  ".gitattributes",
  ".nvmrc",
  ".yamllint.yml",
  ".markdownlint.json",
  ".markdownlint-cli2.yaml",
  ".env.example",
  "package.json",
  "package-lock.json",
  "next-env.d.ts",
  "CODEOWNERS",
]
SPDX-FileCopyrightText = "2026 SecPal"
SPDX-License-Identifier = "CC0-1.0"

[[annotations]]
path = "scripts/*.sh"
SPDX-FileCopyrightText = "2026 SecPal Contributors"
SPDX-License-Identifier = "MIT"

[[annotations]]
path = "scripts/generate-feed.mjs"
SPDX-FileCopyrightText = ["2026 SecPal", "Tailwind Labs Inc."]
SPDX-License-Identifier = "AGPL-3.0-or-later AND LicenseRef-TailwindPlus"

[[annotations]]
path = ["README.md", "CHANGELOG.md", "CONTRIBUTING.md", "CODE_OF_CONDUCT.md", ".github/**"]
SPDX-FileCopyrightText = "2026 SecPal"
SPDX-License-Identifier = "CC0-1.0"

[[annotations]]
path = "public/**"
SPDX-FileCopyrightText = "2026 SecPal Contributors"
SPDX-License-Identifier = "AGPL-3.0-or-later"

[[annotations]]
path = "SECURITY.md"
SPDX-FileCopyrightText = "2026 SecPal"
SPDX-License-Identifier = "CC0-1.0"
